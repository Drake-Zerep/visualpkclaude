<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NL2 Range Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070b14;
    --surface: #0d1525;
    --border: #1a2d4a;
    --neon-blue: #00d4ff;
    --neon-cyan: #00ffcc;
    --neon-green: #39ff14;
    --gold: #ffd700;
    --text: #c8e0ff;
    --text-dim: #4a6a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.022) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1320px; margin: 0 auto; padding: 14px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 20px;
    background: linear-gradient(135deg, rgba(0,212,255,0.07), rgba(0,255,204,0.02));
    border: 1px solid rgba(0,212,255,0.18); border-radius: 10px; margin-bottom: 14px;
  }

  .logo {
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.25rem;
    background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px;
  }

  .logo-sub { font-size: 0.58rem; letter-spacing: 5px; color: var(--text-dim); margin-top: 2px; }

  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 0.62rem; color: var(--neon-green); letter-spacing: 2px; font-family: 'Orbitron', sans-serif; }
  .live-dot { width: 6px; height: 6px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 8px var(--neon-green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  /* TAB GROUPS */
  .tab-group-label { font-family: 'Orbitron', sans-serif; font-size: 0.5rem; letter-spacing: 3px; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; }

  .tabs-wrapper { display: flex; gap: 16px; margin-bottom: 16px; align-items: flex-end; flex-wrap: wrap; }

  .tab-group { display: flex; flex-direction: column; }

  .tab-row { display: flex; gap: 5px; }

  .tab {
    font-family: 'Orbitron', sans-serif; font-size: 0.58rem; letter-spacing: 1.5px;
    padding: 8px 14px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer; border-radius: 6px; transition: all 0.2s; white-space: nowrap;
  }
  .tab:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
  .tab.active { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(0,255,204,0.07); box-shadow: 0 0 12px rgba(0,255,204,0.1); }

  .tab-divider { width: 1px; background: var(--border); align-self: stretch; margin: 0 4px; }

  /* MAIN LAYOUT */
  .main { display: grid; grid-template-columns: 1fr 290px; gap: 16px; align-items: start; }

  .range-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
    position: relative; overflow: hidden;
  }
  .range-panel::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), transparent);
  }

  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }

  .panel-title { font-family: 'Orbitron', sans-serif; font-size: 0.62rem; letter-spacing: 3px; color: var(--neon-blue); }

  .position-label { font-family: 'Orbitron', sans-serif; font-size: 0.95rem; font-weight: 900; color: var(--neon-cyan); letter-spacing: 3px; text-shadow: 0 0 16px rgba(0,255,204,0.4); }

  .matrix-container { overflow-x: auto; }
  .matrix { display: grid; grid-template-columns: repeat(13, 1fr); gap: 2px; min-width: 480px; }

  .cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 0.70rem; border-radius: 3px; cursor: pointer;
    transition: transform 0.1s; border: 1px solid transparent;
    background: rgba(255,255,255,0.02); color: var(--text-dim); user-select: none;
  }
  .cell:hover { transform: scale(1.2); z-index: 10; border-color: rgba(255,255,255,0.22); }

  /* OR mode colors */
  .cell.or-only   { background: rgba(255,255,255,0.06); color: var(--text); border-color: rgba(255,255,255,0.08); }
  .cell.call-3b   { background: rgba(26,79,160,0.72); color: #7fbfff; border-color: rgba(0,120,255,0.3); box-shadow: 0 0 5px rgba(26,79,160,0.3); }
  .cell.fourbet   { background: rgba(255,123,0,0.72); color: #ffcc88; border-color: rgba(255,123,0,0.4); box-shadow: 0 0 5px rgba(255,123,0,0.3); }
  .cell.bluff-4b  { background: rgba(255,34,68,0.78); color: #ffaaaa; border-color: rgba(255,34,68,0.45); box-shadow: 0 0 7px rgba(255,34,68,0.35); }

  /* 3BET/CC mode colors */
  .cell.threebet  { background: rgba(210,40,60,0.8); color: #ffbbbb; border-color: rgba(220,50,70,0.5); box-shadow: 0 0 7px rgba(210,40,60,0.4); }
  .cell.coldcall  { background: rgba(30,90,180,0.75); color: #88c0ff; border-color: rgba(40,110,220,0.4); box-shadow: 0 0 5px rgba(30,90,180,0.35); }

  /* Pair base override */
  .cell.pair { background: rgba(255,215,0,0.07); color: var(--gold); border-color: rgba(255,215,0,0.12); }
  .cell.pair.or-only,.cell.pair.call-3b,.cell.pair.fourbet,.cell.pair.bluff-4b,
  .cell.pair.threebet,.cell.pair.coldcall { background: inherit; color: inherit; }
  .cell.pair.or-only   { background: rgba(255,255,255,0.06); color: var(--text); }
  .cell.pair.call-3b   { background: rgba(26,79,160,0.72); color: #7fbfff; }
  .cell.pair.fourbet   { background: rgba(255,123,0,0.72); color: #ffcc88; }
  .cell.pair.bluff-4b  { background: rgba(255,34,68,0.78); color: #ffaaaa; }
  .cell.pair.threebet  { background: rgba(210,40,60,0.8); color: #ffbbbb; }
  .cell.pair.coldcall  { background: rgba(30,90,180,0.75); color: #88c0ff; }

  .legend { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.52rem; letter-spacing: 1px; color: var(--text-dim); }
  .legend-dot { width: 9px; height: 9px; border-radius: 2px; }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 12px; }

  .info-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px;
    position: relative; overflow: hidden;
  }
  .info-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
  }

  .card-title { font-family: 'Orbitron', sans-serif; font-size: 0.52rem; letter-spacing: 3px; color: var(--text-dim); margin-bottom: 9px; text-transform: uppercase; }

  .position-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }

  .pos-btn {
    font-family: 'Orbitron', sans-serif; font-size: 0.6rem; font-weight: 700; letter-spacing: 1px;
    padding: 9px 4px; border: 1px solid var(--border); background: rgba(255,255,255,0.02);
    color: var(--text-dim); cursor: pointer; border-radius: 5px; transition: all 0.2s; text-align: center;
  }
  .pos-btn:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
  .pos-btn.active { border-color: var(--neon-cyan); color: #070b14; background: var(--neon-cyan); box-shadow: 0 0 12px rgba(0,255,204,0.3); }
  .pos-btn:disabled { opacity: 0.25; cursor: not-allowed; border-color: var(--border); color: var(--text-dim); background: transparent; box-shadow: none; }

  .hand-info {
    background: rgba(0,0,0,0.4); border: 1px solid rgba(0,255,204,0.18); border-radius: 7px; padding: 11px;
    min-height: 72px; display: flex; align-items: center; justify-content: center;
    text-align: center; flex-direction: column; gap: 5px;
  }
  .hand-name { font-family: 'Orbitron', sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--neon-cyan); }
  .hand-action { font-size: 0.62rem; letter-spacing: 2px; padding: 3px 10px; border-radius: 20px; }
  .hand-action.call-3b { background: rgba(26,79,160,0.4); color: #7fbfff; border: 1px solid #1a4fa0; }
  .hand-action.fourbet { background: rgba(255,123,0,0.4); color: #ffcc88; border: 1px solid #ff7b00; }
  .hand-action.bluff-4b { background: rgba(255,34,68,0.4); color: #ffaaaa; border: 1px solid #ff2244; }
  .hand-action.threebet { background: rgba(210,40,60,0.4); color: #ffbbbb; border: 1px solid rgba(220,50,70,0.7); }
  .hand-action.coldcall { background: rgba(30,90,180,0.4); color: #88c0ff; border: 1px solid rgba(40,110,220,0.6); }
  .hand-action.fold { background: rgba(255,255,255,0.04); color: var(--text-dim); border: 1px solid var(--border); }
  .hand-action.or-only { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .stat-block { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 7px; padding: 8px; text-align: center; }
  .stat-number { font-family: 'Orbitron', sans-serif; font-size: 1.15rem; font-weight: 700; color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,255,204,0.3); }
  .stat-label { font-size: 0.48rem; letter-spacing: 1px; color: var(--text-dim); margin-top: 2px; }

  .filter-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .filter-btn { font-size: 0.58rem; padding: 5px 9px; border-radius: 20px; border: 1px solid transparent; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
  .filter-btn[data-type="call-3b"] { border-color: #1a4fa0; color: #7fbfff; background: rgba(26,79,160,0.12); }
  .filter-btn[data-type="fourbet"] { border-color: #ff7b00; color: #ffcc88; background: rgba(255,123,0,0.12); }
  .filter-btn[data-type="bluff-4b"] { border-color: #ff2244; color: #ffaaaa; background: rgba(255,34,68,0.12); }
  .filter-btn[data-type="threebet"] { border-color: rgba(210,40,60,0.8); color: #ffbbbb; background: rgba(210,40,60,0.12); }
  .filter-btn[data-type="coldcall"] { border-color: rgba(30,90,180,0.8); color: #88c0ff; background: rgba(30,90,180,0.12); }
  .filter-btn[data-type="or"] { border-color: var(--border); color: var(--text); background: rgba(255,255,255,0.04); }
  .filter-btn.off { opacity: 0.25; }

  @media (max-width: 860px) { .main { grid-template-columns: 1fr; } }
</style>
</head>

<div class="app">
  <header>
    <div>
      <div class="logo">RANGE VIEWER</div>
      <div class="logo-sub">NL2 · TEXAS HOLD'EM · GTO</div>

    <div class="live-badge"><div class="live-dot"></div>SESSION ACTIVE</div>
  </header>

  <div class="tabs-wrapper">
    <div class="tab-group">

      </div>
    </div>
    <div class="tab-divider"></div>
    <div class="tab-group">

  <div class="main">
    <div class="range-panel">

      <div class="matrix-container">

    <div class="sidebar">
      <div class="info-card">

      <div class="info-card">

      <div class="info-card">
        <div class="card-title">Filtros</div>
        <div class="filter-row" id="filter-row"></div>
      </div>
    </div>
  </div>
</div>

let currentMode = 'OR';

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getKey(i, j) {
  const r1 = RANKS[i], r2 = RANKS[j];
  if (i === j) return r1 + r2;
  if (j > i) return r1 + r2 + 's';
  return r2 + r1 + 'o';
}

function getCombos(key) {
  if (key.length === 2) return 6;
  if (key.endsWith('s')) return 4;
  return 12;
}

function getRangeData() {
  if (currentMode === 'OR') return OR_RANGES[currentPos] || {};
  return THREEBET_RANGES[currentPos] || {};
}

function getState(key) { return getRangeData()[key] || ''; }

function getCellClass(state) {
  if (!state) return '';
  const cfg = MODE_CONFIG[currentMode];
  const activeFilters = filters;

  if (currentMode === 'OR') {
    if (state === 'or') return activeFilters.or ? 'or-only' : '';
    if (state === 'call-3b') return activeFilters['call-3b'] ? 'call-3b' : (activeFilters.or ? 'or-only' : '');
    if (state === '4bet') return activeFilters.fourbet ? 'fourbet' : (activeFilters.or ? 'or-only' : '');
    if (state === 'bluff-4b') return activeFilters['bluff-4b'] ? 'bluff-4b' : (activeFilters.or ? 'or-only' : '');
  } else {
    if (state === 'threebet') return activeFilters.threebet ? 'threebet' : '';
    if (state === 'coldcall') return activeFilters.coldcall ? 'coldcall' : '';
  }
  return '';
}

function getActionLabel(state) {
  const map = MODE_CONFIG[currentMode].actionMap;
  return map[state] || map[''];
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function buildMatrix() {
  const matrix = document.getElementById('matrix');
  matrix.innerHTML = '';

  let counts = { or: 0, 'call-3b': 0, fourbet: 0, 'bluff-4b': 0, threebet: 0, coldcall: 0, fold: 0, all: 0 };

  for (let i = 0; i < 13; i++) {
    for (let j = 0; j < 13; j++) {
      const isPair = i === j;
      const isSuited = j > i;
      const key = getKey(i, j);
      const state = getState(key);
      const cls = getCellClass(state);
      const combos = getCombos(key);

      if (state) {
        counts.all += combos;
        if (state === 'or' || state === 'call-3b' || state === '4bet' || state === 'bluff-4b') counts.or += combos;
        if (counts[state] !== undefined) counts[state] += combos;
      } else {
        counts.fold += combos;
      }

      const cell = document.createElement('div');
      cell.className = `cell ${isPair ? 'pair' : (isSuited ? 'suited' : 'offsuit')} ${cls}`.trim();
      cell.textContent = key;
      cell.addEventListener('mouseenter', () => showHandInfo(key, state));
      cell.addEventListener('mouseleave', clearHandInfo);
      matrix.appendChild(cell);
    }
  }

  renderStats(counts);
}

function renderStats(counts) {
  const cfg = MODE_CONFIG[currentMode];
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = '';
  cfg.statLabels.forEach((label, i) => {
    const key = cfg.statKeys[i];
    let val = 0;
    if (key === 'or') val = counts.or;
    else if (key === 'all') val = counts.all;
    else if (key === 'fold') val = counts.fold;
    else val = counts[key] || 0;

    grid.innerHTML += `
      <div class="stat-block">
        <div class="stat-number" style="color:${cfg.statColors[i]};text-shadow:0 0 10px ${cfg.statColors[i]}44">${val}</div>
        <div class="stat-label">${label}</div>
      </div>`;
  });
}

function renderLegend() {
  const legend = document.getElementById('legend');
  const cfg = MODE_CONFIG[currentMode];
  legend.innerHTML = cfg.legend.map(item =>
    `<div class="legend-item"><div class="legend-dot" style="background:${item.color}"></div><span>${item.label}</span></div>`
  ).join('');
}

function renderFilters() {
  const row = document.getElementById('filter-row');
  const cfg = MODE_CONFIG[currentMode];
  row.innerHTML = cfg.filterDefs.map(f =>
    `<button class="filter-btn ${filters[f.type] ? '' : 'off'}" data-type="${f.type}">${f.label}</button>`
  ).join('');
  row.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.type;
      filters[t] = !filters[t];
      btn.classList.toggle('off', !filters[t]);
      buildMatrix();
    });
  });
}

function renderPositionGrid() {
  const grid = document.getElementById('pos-grid');
  const cfg = MODE_CONFIG[currentMode];
  document.getElementById('pos-card-title').textContent = cfg.posLabel;
  grid.innerHTML = '';
  cfg.positions.forEach(pos => {
    const btn = document.createElement('button');
    btn.className = 'pos-btn' + (pos === currentPos ? ' active' : '');
    btn.textContent = POS_DISPLAY[pos] || pos;
    btn.dataset.pos = pos;
    btn.style.fontSize = pos.length > 5 ? '0.42rem' : '0.6rem';
    btn.addEventListener('click', () => {
      currentPos = pos;
      document.querySelectorAll('.pos-btn').forEach(b => b.classList.toggle('active', b.dataset.pos === pos));
      document.getElementById('position-display').textContent = POS_DISPLAY[pos] || pos;
      buildMatrix();
    });
    grid.appendChild(btn);
  });
}

function showHandInfo(key, state) {
  const action = getActionLabel(state);
  const combos = getCombos(key);
  document.getElementById('hand-info').innerHTML = `
    <div class="hand-name">${key}</div>
    <div class="hand-action ${action.cls}">${action.label}</div>
    <div style="font-size:0.52rem;color:var(--text-dim);margin-top:4px">${combos} combos</div>
  `;
}

function clearHandInfo() {
  document.getElementById('hand-info').innerHTML = `<div style="color:var(--text-dim);font-size:0.58rem;letter-spacing:2px">HOVER SOBRE UNA MANO</div>`;
}

// ─── TAB HANDLING ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    const newMode = tab.dataset.mode;
    const newSub = tab.dataset.sub;
    const cfg = MODE_CONFIG[newMode];

    currentMode = newMode;
    currentSub = newSub;

    // Set position to appropriate default for this sub-view
    if (newMode === '3BET') {
      currentPos = newSub;
    } else {
      currentPos = cfg.defaultPos;
    }

    document.getElementById('panel-subtitle').textContent = tab.textContent.toUpperCase();
    document.getElementById('position-display').textContent = POS_DISPLAY[currentPos] || currentPos;

    renderPositionGrid();
    renderLegend();
    renderFilters();
    buildMatrix();
  });
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderPositionGrid();
renderLegend();
renderFilters();
buildMatrix();
</script>
</body>
</html>
